<header class="cf-nav">
  <div class="cf-brand">
    <img class="cf-brand-mark" src="CozyFlameLogoColor.svg" alt="" aria-hidden="true" />
    <span class="cf-brand-name">COZYFLAME</span>
  </div>

  <nav class="cf-nav-links">
    <a class="cf-nav-link" [class.active]="lib.navFilter() === 'home'"   (click)="setFilter('home')">Home</a>
    <a class="cf-nav-link" [class.active]="lib.navFilter() === 'films'"  (click)="setFilter('films')">Films</a>
    <a class="cf-nav-link" [class.active]="lib.navFilter() === 'series'" (click)="setFilter('series')">Series</a>
    <a class="cf-nav-link" [class.active]="lib.navFilter() === 'list'"   (click)="setFilter('list')">List</a>
  </nav>

  <div class="cf-nav-right">
    <button class="cf-fireplace-btn" (click)="enterFireplace()" title="Modo Lareira">
      <span class="cf-fireplace-dot" [class.on]="fire.active()" aria-hidden="true"></span>
      Fireplace Mode
    </button>

    <app-processing-tracker />

    <div class="cf-avatar" aria-label="Perfil">TD</div>
  </div>
</header>

<!-- Mobile bottom tab bar (shown ≤640px; the top-row links are hidden there) -->
<nav class="cf-tabbar" aria-label="Seções">
  <button class="cf-tab" [class.active]="lib.navFilter() === 'home'" (click)="setFilter('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h5v-6h4v6h5V10"/></svg>
    <span>Home</span>
  </button>
  <button class="cf-tab" [class.active]="lib.navFilter() === 'films'" (click)="setFilter('films')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 4v16M17 4v16M3 9h4M17 9h4M3 15h4M17 15h4"/></svg>
    <span>Films</span>
  </button>
  <button class="cf-tab" [class.active]="lib.navFilter() === 'series'" (click)="setFilter('series')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="13" rx="2"/><path d="M8 3l4 4 4-4"/></svg>
    <span>Series</span>
  </button>
  <button class="cf-tab" [class.active]="lib.navFilter() === 'list'" (click)="setFilter('list')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3H7a2 2 0 0 0-2 2v16l7-3 7 3V5a2 2 0 0 0-2-2z"/></svg>
    <span>List</span>
  </button>
</nav>
